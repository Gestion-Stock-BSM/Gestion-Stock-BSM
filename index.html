<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock de Reactivos Avanzado</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f5;color:#222;min-height:100vh}
.topbar{background:#2F5496;color:#fff;padding:14px 20px;display:flex;align-items:center;gap:14px}
/* Contenedor del Logo en el Header */
.topbar-logo{height:32px; width:auto; display:block; object-fit:contain}
.topbar h1{font-size:17px;font-weight:500}
.container{max-width:760px;margin:0 auto;padding:16px}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{flex:1;padding:11px;border:1.5px solid #ddd;border-radius:10px;background:#fff;cursor:pointer;font-size:14px;font-weight:500;color:#888;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.tab.active.ingreso{background:#EAF3DE;border-color:#639922;color:#27500A}
.tab.active.egreso{background:#FCEBEB;border-color:#A32D2D;color:#501313}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:18px;margin-bottom:14px}
.field{margin-bottom:14px}
.dynamic-field{display:none;} 
.dynamic-field.show{display:block;}

/* MODIFICACIÓN: Label agrandado dos puntos y en negrita fuerte */
label{display:block;font-size:15px;color:#222;margin-bottom:6px;font-weight:700}

input,select{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#222;font-size:14px;font-family:Arial,sans-serif}
input:focus,select:focus{outline:none;border-color:#2F5496;box-shadow:0 0 0 2px rgba(47,84,150,.15)}
.prod-row{display:flex;gap:8px;align-items:flex-end}
.prod-row select{flex:1}
.btn-add-prod{padding:10px 14px;border:1px solid #ddd;border-radius:8px;background:#f5f5f5;cursor:pointer;font-size:13px;white-space:nowrap;color:#555}
.btn-submit{width:100%;padding:12px;border-radius:8px;border:none;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.btn-ingreso{background:#3B6D11;color:#fff}
.btn-ingreso:hover{background:#27500A}
.btn-egreso{background:#A32D2D;color:#fff}
.btn-egreso:hover{background:#791F1F}
.btn-submit:disabled{opacity:.6;cursor:not-allowed}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.metric{background:#f8f8f8;border-radius:8px;padding:14px 10px;text-align:center}
.mval{font-size:22px;font-weight:500;margin-top:4px}
.mlbl{font-size:11px;color:#888}
.m-in .mval{color:#27500A}
.m-eg .mval{color:#A32D2D}
.section-title{font-size:13px;font-weight:500;color:#888;margin-bottom:12px;display:flex;align-items:center;gap:6px;justify-content:space-between}
.filter-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-row select{width:auto;font-size:13px;padding:7px 10px;min-width:140px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f5f5f5;padding:10px 10px;text-align:left;font-weight:600;color:#555;border-bottom:2px solid #ddd;white-space:nowrap;cursor:pointer;user-select:none;transition:background 0.15s;}
th:hover{background:#e8e8e8;color:#222}
th .sort-icon {font-size:11px;margin-left:4px;color:#999}
td{padding:10px 10px;border-bottom:1px solid #f0f0f0;color:#222;vertical-align:middle}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.badge-ingreso{background:#EAF3DE;color:#3B6D11}
.badge-egreso{background:#FCEBEB;color:#A32D2D}
.del-btn{background:none;border:none;cursor:pointer;color:#bbb;padding:4px 6px;border-radius:4px;font-size:13px;transition: all 0.15s;}
.del-btn:hover{color:#A32D2D;background:#FCEBEB}
.empty{text-align:center;padding:2rem;color:#aaa;font-size:13px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:11px 22px;border-radius:8px;font-size:14px;font-weight:500;z-index:99;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast-ingreso{background:#EAF3DE;color:#27500A;border:1px solid #639922}
.toast-egreso{background:#FCEBEB;color:#501313;border:1px solid #A32D2D}
.toast-error{background:#fff3cd;color:#856404;border:1px solid #ffc107}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:20px;width:320px;border:1px solid #ddd}
.modal h3{font-size:15px;font-weight:500;margin-bottom:14px}
.modal input{margin-bottom:4px}
.modal-btns{display:flex;gap:8px;margin-top:12px}
.modal-btns button{flex:1;padding:9px;border-radius:8px;font-size:13px;cursor:pointer;font-family:Arial,sans-serif}
.btn-cancel{border:1px solid #ddd;background:#f5f5f5;color:#555}
